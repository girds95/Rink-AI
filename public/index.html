<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>Rink AI · Hockey Coach</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#07090F; --surface:#10141F; --surface-hi:#1A1F2E; --border:#222A3D;
    --ice:#5BC0EB; --ice-deep:#2B7FB8; --fire:#FF2D2D;
    --text:#F0F4FA; --muted:#7B8499; --muted-dim:#4A5266;
    --good:#4ADE80; --warn:#FBBF24;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
  html,body{background:#000;font-family:'Manrope',-apple-system,sans-serif;color:var(--text);overscroll-behavior:none}
  body{min-height:100vh;min-height:100dvh}
  input,textarea,select{font-family:inherit;color:inherit;background:transparent;border:none;outline:none}
  .bebas{font-family:'Bebas Neue',sans-serif;letter-spacing:.04em}
  .mono{font-family:'JetBrains Mono',monospace}
  .no-sb::-webkit-scrollbar{display:none}
  .no-sb{scrollbar-width:none}
  button{cursor:pointer;border:none;background:none;color:inherit;font:inherit;transition:transform .1s}
  button:active{transform:scale(.98)}
  button:disabled{opacity:.5;cursor:not-allowed}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .fade-up{animation:fadeUp .35s ease-out}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .pulse{animation:pulse 1.5s ease-in-out infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .spin{animation:spin 1s linear infinite}
  #phone{position:relative;margin:0 auto;max-width:480px;min-height:100vh;min-height:100dvh;background:var(--bg);display:flex;flex-direction:column;overflow:hidden}
  #status{display:flex;justify-content:space-between;align-items:center;padding:max(1rem,env(safe-area-inset-top)) 1.5rem .25rem;font-size:.75rem;font-weight:600}
  #screen{flex:1;overflow-y:auto;padding-bottom:7rem}
  .page{animation:fadeUp .35s ease-out;padding:.5rem 1.5rem 0}
  #tabbar{position:absolute;bottom:0;left:0;right:0;padding:.5rem .5rem max(1.5rem,env(safe-area-inset-bottom));background:var(--bg);border-top:1px solid var(--border)}
  #tabbar>div{display:flex;justify-content:space-around}
  .tab{display:flex;flex-direction:column;align-items:center;gap:.25rem;padding:.25rem .75rem}
  .tab-plus{width:2.75rem;height:2.75rem;border-radius:1rem;display:flex;align-items:center;justify-content:center;margin-top:-.25rem;background:var(--fire);box-shadow:0 6px 20px rgba(255,45,45,.4)}
  h1.title{font-family:'Bebas Neue';font-size:38px;line-height:1;letter-spacing:.01em}
  .slabel{font-size:.75rem;text-transform:uppercase;letter-spacing:.1em;font-family:'JetBrains Mono';font-weight:500;color:var(--muted);margin-bottom:.5rem}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:1rem;padding:1rem}
  .btn{width:100%;padding:1.25rem;border-radius:1.5rem;display:flex;align-items:center;justify-content:space-between}
  .btn-red{background:linear-gradient(135deg,var(--fire),#C71F1F);box-shadow:0 10px 30px rgba(255,45,45,.25);color:#fff}
  .btn-blue{background:linear-gradient(135deg,var(--ice),var(--ice-deep));box-shadow:0 10px 30px rgba(91,192,235,.2);color:var(--bg)}
  .btn-secondary{background:var(--surface);border:1px solid var(--border)}
  .sbtn{width:100%;padding:1.25rem;border-radius:1rem;display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:1px solid var(--border)}
  .sicon{width:3rem;height:3rem;border-radius:.75rem;display:flex;align-items:center;justify-content:center;background:var(--surface-hi);font-size:1.5rem}
  .input{width:100%;padding:1rem 1.25rem;border-radius:.75rem;background:var(--surface-hi);border:1px solid var(--border);color:var(--text);font-size:1rem;margin-bottom:.75rem}
  .input:focus{border-color:var(--ice)}
  .seg{display:flex;background:var(--surface-hi);border:1px solid var(--border);border-radius:.75rem;padding:.25rem;gap:.25rem;margin-bottom:.75rem}
  .seg button{flex:1;padding:.625rem;border-radius:.5rem;font-size:.8125rem;font-weight:600;color:var(--muted)}
  .seg button.active{background:var(--ice);color:var(--bg)}
  .chip{display:inline-block;padding:.25rem .625rem;border-radius:9999px;font-size:.6875rem;font-weight:600;font-family:'JetBrains Mono';letter-spacing:.05em}
  .chip-blue{background:rgba(91,192,235,.15);color:var(--ice);border:1px solid rgba(91,192,235,.3)}
  .chip-green{background:rgba(74,222,128,.15);color:var(--good);border:1px solid rgba(74,222,128,.3)}
  .chip-red{background:rgba(255,45,45,.15);color:var(--fire);border:1px solid rgba(255,45,45,.3)}
  .toast{position:fixed;bottom:6rem;left:50%;transform:translateX(-50%);padding:.75rem 1.25rem;border-radius:.75rem;background:var(--surface-hi);border:1px solid var(--border);font-size:.875rem;z-index:1000;animation:fadeUp .3s ease-out;max-width:90vw}
  .toast.success{border-color:var(--good);color:var(--good)}
  .toast.error{border-color:var(--fire);color:var(--fire)}
</style>
</head>
<body>
<div id="phone">
  <div id="status">
    <span>9:41</span>
    <div style="display:flex;gap:.375rem;align-items:center">
      <span style="opacity:.8">●●●●</span>
      <span style="opacity:.8">5G</span>
      <span style="margin-left:.25rem">▮▮▮</span>
    </div>
  </div>
  <div id="screen"></div>
  <div id="tabbar"></div>
</div>
<script type="module" src="/app.js"></script>
<script>
  window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
</script>
<script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
