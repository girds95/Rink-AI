<script type="module">
const state={screen:"home",skill:null,videoFile:null,videoUrl:null,result:null,error:null,progress:0,stage:0,frames:[],stageText:""};
const SKILLS=[{id:"wrist",name:"Wrist Shot",icon:"🎯"},{id:"snap",name:"Snap Shot",icon:"💥"},{id:"slap",name:"Slap Shot",icon:"⚡"},{id:"stride",name:"Skating Stride",icon:"💨"},{id:"stick",name:"Stickhandling",icon:"🔵"},{id:"back",name:"Backhand",icon:"↩️"}];

async function extractFrames(file,n,onProg,onStage){
  const fileInfo=`(${file.name||"video"}, ${(file.size/1024/1024).toFixed(1)}MB, type: ${file.type||"unknown"})`;
  const url=URL.createObjectURL(file);
  const v=document.createElement("video");
  v.muted=true;v.playsInline=true;v.preload="auto";
  v.setAttribute("muted","");v.setAttribute("playsinline","");v.setAttribute("webkit-playsinline","");
  v.style.cssText="position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;opacity:0";
  document.body.appendChild(v);
  const cleanup=()=>{try{document.body.removeChild(v)}catch{}URL.revokeObjectURL(url)};
  try{
    onStage?.("Loading video");
    await new Promise((resolve,reject)=>{
      const t=setTimeout(()=>reject(new Error(`Video load timed out after 20s ${fileInfo}`)),20000);
      const ready=()=>{
        clearTimeout(t);
        if(!v.videoWidth||!v.videoHeight)return reject(new Error(`Video loaded but has no visible dimensions ${fileInfo}`));
        if(!isFinite(v.duration)||v.duration<=0)return reject(new Error(`Video loaded but duration is invalid (${v.duration}) ${fileInfo}`));
        resolve();
      };
      const err=()=>{
        clearTimeout(t);
        const e=v.error;
        const m={1:"ABORTED",2:"NETWORK",3:"DECODE",4:"SRC_NOT_SUPPORTED"};
        const codeName=m[e?.code]||`code ${e?.code||"unknown"}`;
        const detail=e?.message||"no details";
        reject(new Error(`Video decode failed: ${codeName} — ${detail} ${fileInfo}`));
      };
      v.addEventListener("loadeddata",ready);
      v.addEventListener("canplay",ready);
      v.addEventListener("error",err);
      v.src=url;v.load();
    });
    const dur=v.duration;
    const c=document.createElement("canvas");
    const w=640;c.width=w;c.height=Math.round(w*(v.videoHeight/v.videoWidth));
    const ctx=c.getContext("2d");
    onStage?.("Extracting frames");
    const frames=[];
    for(let i=0;i<n;i++){
      const time=(dur/(n+1))*(i+1);
      try{
        await new Promise((res,rej)=>{
          const s=()=>{v.removeEventListener("seeked",s);res()};
          const seekErr=()=>{v.removeEventListener("error",seekErr);rej(new Error(`Video errored mid-extraction at ${time.toFixed(1)}s`))};
          v.addEventListener("seeked",s);
          v.addEventListener("error",seekErr);
          v.currentTime=time;
          setTimeout(()=>{v.removeEventListener("seeked",s);rej(new Error(`Could not seek to ${time.toFixed(1)}s of ${dur.toFixed(1)}s clip ${fileInfo}`))},10000);
        });
        ctx.drawImage(v,0,0,c.width,c.height);
        const d=c.toDataURL("image/jpeg",0.7);
        if(!d||d.length<100)throw new Error(`Frame ${i+1} extracted blank (canvas may be tainted)`);
        frames.push({time:time.toFixed(1),base64:d.split(",")[1],preview:d});
        onProg?.((i+1)/n);
      }catch(frameErr){
        throw new Error(`Frame ${i+1}/${n}: ${frameErr.message}`);
      }
    }
    cleanup();return{frames,duration:dur};
  }catch(err){cleanup();throw err}
}

async function callBackend(frames,skill,duration){
  const r=await fetch("/api/analyze",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({frames,skill,duration})});
  if(!r.ok){const e=await r.json().catch(()=>({error:"Unknown"}));throw new Error(`${e.error||"Failed"}${e.detail?": "+e.detail:""}`)}
  return await r.json();
}

  user:'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>',
  logo:'<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12h20"/><path d="M12 2v20"/><path d="m4.93 4.93 14.14 14.14"/><path d="m19.07 4.93-14.14 14.14"/></svg>',
};

function go(s){state.screen=s;renderScreen();renderTabBar()}

function renderScreen(){
  const el=document.getElementById("screen");if(!el)return;
  const fns={home:Home,skill:Skill,upload:Upload,analyzing:Analyzing,results:Results,workout:Workout,error:ErrorS};
  const fn=fns[state.screen]||Home;
  el.innerHTML=`<div class="page">${fn()}</div>`;
  bind();
}

    <div style="width:2.25rem;height:2.25rem;border-radius:9999px;display:flex;align-items:center;justify-content:center;background:var(--surface-hi);border:1px solid var(--border)"><span class="bebas" style="font-size:.875rem;color:var(--ice)">JM</span></div>

function Skill(){return `

function Upload(){const sk=SKILLS.find(s=>s.id===state.skill);return `
  <button data-a="back-skill" style="display:flex;align-items:center;gap:.25rem;margin-bottom:1.5rem;color:var(--muted)">${icons.back}<span style="font-size:.875rem;font-weight:600">Back</span></button>

  const stages=["Loading video","Extracting frames","Sending to Claude","Analyzing form","Building plan"];
  const pct=Math.round(state.progress);
  return `<p class="slabel" style="color:var(--ice);font-weight:600">Analyzing</p>
  <h1 class="title">BREAKING DOWN<br>YOUR FORM.</h1>
  <div style="position:relative;margin-top:1.5rem;border-radius:1.5rem;overflow:hidden;background:#000;aspect-ratio:9/12">
    ${state.videoUrl?`<video src="${state.videoUrl}" autoplay muted loop playsinline style="width:100%;height:100%;object-fit:cover"></video>`:""}
    <div style="position:absolute;inset:0;pointer-events:none;background:linear-gradient(180deg,transparent 60%,rgba(0,0,0,.85) 100%)"></div>
    <div style="position:absolute;top:1rem;left:1rem;right:1rem;display:flex;justify-content:space-between;align-items:center">

    </div>
    <div style="position:absolute;bottom:1rem;left:1rem;right:1rem">
      <div id="stagetext" class="mono" style="font-size:.75rem;margin-bottom:.5rem;color:#fff;opacity:.9;font-weight:500">${state.stageText||stages[state.stage]+"..."}</div>
      <div style="width:100%;height:4px;border-radius:9999px;overflow:hidden;background:rgba(255,255,255,.2)"><div id="pbar" style="height:100%;border-radius:9999px;transition:all .3s;width:${pct}%;background:var(--ice)"></div></div>
    </div>
  </div>
  <div id="framelist">${state.frames.length>0?`<div style="margin-top:1.25rem"><div class="slabel" style="font-weight:600;margin-bottom:.75rem">Frames sent to AI</div><div class="no-sb" style="display:flex;gap:.5rem;overflow-x:auto;padding-bottom:.5rem">${state.frames.map(f=>`<div style="flex-shrink:0;border-radius:.5rem;overflow:hidden;position:relative;width:70px;height:70px;border:1px solid var(--border)"><img src="${f.preview}" alt="" style="width:100%;height:100%;object-fit:cover"/><div class="mono" style="position:absolute;bottom:0;left:0;right:0;padding:.125rem .25rem;font-size:9px;background:rgba(0,0,0,.7);color:#fff">${f.time}s</div></div>`).join("")}</div></div>`:""}</div>
  <div id="stagelist" style="margin-top:1.25rem;display:flex;flex-direction:column;gap:.625rem">
    ${stages.map((s,i)=>{const d=i<state.stage,a=i===state.stage;return `<div style="display:flex;align-items:center;gap:.75rem"><div style="width:1.5rem;height:1.5rem;border-radius:9999px;display:flex;align-items:center;justify-content:center;background:${d?"var(--ice)":a?"rgba(91,192,235,.2)":"var(--surface)"};border:1px solid ${d||a?"var(--ice)":"var(--border)"}">${d?`<div style="color:var(--bg)">${icons.check}</div>`:a?'<div class="pulse" style="width:.5rem;height:.5rem;border-radius:9999px;background:var(--ice)"></div>':''}</div><span style="font-size:.875rem;font-weight:${a?700:500};color:${d||a?'var(--text)':'var(--muted-dim)'}">${s}</span></div>`}).join("")}
  </div>`}

function updateAnalyzing(){
  if(state.screen!=="analyzing")return;
  const stages=["Loading video","Extracting frames","Sending to Claude","Analyzing form","Building plan"];
  const pct=Math.round(state.progress);
  const pctEl=document.getElementById("pct");
  const pbarEl=document.getElementById("pbar");
  const stEl=document.getElementById("stagetext");
  const flEl=document.getElementById("framelist");
  const slEl=document.getElementById("stagelist");
  if(pctEl)pctEl.textContent=pct+"%";
  if(pbarEl)pbarEl.style.width=pct+"%";
  if(stEl)stEl.textContent=state.stageText||stages[state.stage]+"...";
  if(flEl&&state.frames.length>0&&!flEl.hasChildNodes()){
    flEl.innerHTML=`<div style="margin-top:1.25rem"><div class="slabel" style="font-weight:600;margin-bottom:.75rem">Frames sent to AI</div><div class="no-sb" style="display:flex;gap:.5rem;overflow-x:auto;padding-bottom:.5rem">${state.frames.map(f=>`<div style="flex-shrink:0;border-radius:.5rem;overflow:hidden;position:relative;width:70px;height:70px;border:1px solid var(--border)"><img src="${f.preview}" alt="" style="width:100%;height:100%;object-fit:cover"/><div class="mono" style="position:absolute;bottom:0;left:0;right:0;padding:.125rem .25rem;font-size:9px;background:rgba(0,0,0,.7);color:#fff">${f.time}s</div></div>`).join("")}</div></div>`;
  }
  if(slEl){
    slEl.innerHTML=stages.map((s,i)=>{const d=i<state.stage,a=i===state.stage;return `<div style="display:flex;align-items:center;gap:.75rem"><div style="width:1.5rem;height:1.5rem;border-radius:9999px;display:flex;align-items:center;justify-content:center;background:${d?"var(--ice)":a?"rgba(91,192,235,.2)":"var(--surface)"};border:1px solid ${d||a?"var(--ice)":"var(--border)"}">${d?`<div style="color:var(--bg)">${icons.check}</div>`:a?'<div class="pulse" style="width:.5rem;height:.5rem;border-radius:9999px;background:var(--ice)"></div>':''}</div><span style="font-size:.875rem;font-weight:${a?700:500};color:${d||a?'var(--text)':'var(--muted-dim)'}">${s}</span></div>`}).join("");
  }
}

function Results(){
  const r=state.result;if(!r)return"Loading...";
  const sk=SKILLS.find(s=>s.id===state.skill);
  const gc=r.score>=85?"var(--good)":r.score>=70?"var(--ice)":r.score>=50?"var(--warn)":"var(--fire)";
  const m=r.metrics||[];const sz=240,cx=sz/2,cy=sz/2,rm=80;
  const pts=m.map((x,i)=>{const a=(Math.PI*2*i/m.length)-Math.PI/2;const rv=(x.value/100)*rm;return{x:cx+Math.cos(a)*rv,y:cy+Math.sin(a)*rv}});
  const lbls=m.map((x,i)=>{const a=(Math.PI*2*i/m.length)-Math.PI/2;return{x:cx+Math.cos(a)*(rm+22),y:cy+Math.sin(a)*(rm+22),label:x.label}});
  return `<button data-a="back-home" style="display:flex;align-items:center;gap:.25rem;margin-bottom:1rem;color:var(--muted)">${icons.back}<span style="font-size:.875rem;font-weight:600">Home</span></button>
  <p class="slabel" style="color:var(--ice);font-weight:600">${sk?.name} · Analyzed by Claude</p>
  <h1 class="title">YOUR REPORT.</h1>
  <div style="margin-top:1.5rem;padding:1.5rem;border-radius:1.5rem;position:relative;overflow:hidden;background:linear-gradient(135deg,var(--surface-hi),var(--surface));border:1px solid var(--border)">
    <div style="position:absolute;top:-2.5rem;right:-2.5rem;width:10rem;height:10rem;border-radius:9999px;opacity:.2;background:radial-gradient(circle,${gc},transparent 70%)"></div>
    <div style="position:relative">
      <div class="slabel" style="font-weight:600;margin-bottom:.5rem">Overall score</div>
      <div style="display:flex;align-items:baseline;gap:.5rem"><span class="bebas" style="font-size:76px;line-height:.9;letter-spacing:-.02em">${r.score}</span><span class="bebas" style="font-size:1.5rem;color:var(--muted)">/100</span></div>
      <div style="margin-top:.5rem;display:inline-block;padding:.25rem .75rem;border-radius:9999px;background:${gc}22;border:1px solid ${gc}44"><span class="mono" style="font-size:11px;color:${gc};font-weight:700;letter-spacing:.05em">GRADE ${r.grade}</span></div>
      ${r.summary?`<p style="margin-top:1rem;font-size:.875rem;line-height:1.5">${r.summary}</p>`:""}
    </div>
    <div style="margin-top:1.5rem;display:flex;justify-content:center">
      <svg width="${sz+60}" height="${sz+40}" viewBox="-30 -20 ${sz+60} ${sz+40}">
        ${[.25,.5,.75,1].map(sc=>`<circle cx="${cx}" cy="${cy}" r="${rm*sc}" fill="none" stroke="var(--border)" stroke-width="1"/>`).join("")}
        <polygon points="${pts.map(p=>`${p.x},${p.y}`).join(" ")}" fill="var(--ice)" fill-opacity=".25" stroke="var(--ice)" stroke-width="2"/>
        ${pts.map(p=>`<circle cx="${p.x}" cy="${p.y}" r="3" fill="var(--ice)"/>`).join("")}
        ${lbls.map(l=>`<text x="${l.x}" y="${l.y}" text-anchor="middle" dominant-baseline="middle" font-family="JetBrains Mono" font-size="10" font-weight="600" fill="var(--muted)">${l.label}</text>`).join("")}
      </svg>
    </div>
  </div>
  ${r.strengths?.length?`<div style="margin-top:1.5rem"><div style="display:flex;align-items:center;gap:.5rem;margin-bottom:.75rem"><div style="width:4px;height:1rem;border-radius:9999px;background:var(--good)"></div><h2 class="slabel" style="font-weight:700;margin:0">What's working</h2></div><div class="card" style="display:flex;flex-direction:column;gap:.75rem">${r.strengths.map(s=>`<div style="display:flex;gap:.75rem;align-items:flex-start"><div style="color:var(--good);margin-top:.125rem;flex-shrink:0">${icons.check}</div><span style="font-size:.875rem;line-height:1.5">${s}</span></div>`).join("")}</div></div>`:""}
  ${r.improvements?.length?`<div style="margin-top:1.5rem"><div style="display:flex;align-items:center;gap:.5rem;margin-bottom:.75rem"><div style="width:4px;height:1rem;border-radius:9999px;background:var(--fire)"></div><h2 class="slabel" style="font-weight:700;margin:0">Coach's notes</h2></div><div style="display:flex;flex-direction:column;gap:.75rem">${r.improvements.map((imp,i)=>`<div class="card"><div style="display:flex;align-items:flex-start;gap:.75rem"><div style="width:1.75rem;height:1.75rem;border-radius:.5rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:rgba(255,45,45,.15)"><span class="mono" style="color:var(--fire);font-size:.75rem;font-weight:700">${i+1}</span></div><div style="flex:1"><div style="font-size:.875rem;font-weight:700">${imp.title}</div><div style="margin-top:.375rem;font-size:.8125rem;color:var(--muted);line-height:1.5">${imp.detail}</div></div></div></div>`).join("")}</div></div>`:""}
  ${r.workout?`<button data-a="show-workout" class="btn btn-blue" style="margin-top:1.75rem"><div style="text-align:left"><div class="mono" style="font-size:.75rem;text-transform:uppercase;letter-spacing:.1em;opacity:.9;margin-bottom:.25rem;font-weight:700">Next step</div><div class="bebas" style="font-size:1.375rem">SEE MY WORKOUT PLAN</div></div><div style="color:var(--bg)">${icons.right}</div></button>`:""}`}

function Workout(){
  const w=state.result?.workout;if(!w)return"No workout";
  return `<button data-a="back-results" style="display:flex;align-items:center;gap:.25rem;margin-bottom:1rem;color:var(--muted)">${icons.back}<span style="font-size:.875rem;font-weight:600">Back to report</span></button>
  <p class="slabel" style="color:var(--ice);font-weight:600">${w.weeks||4}-week plan · Personalized</p>
  <h1 class="title">TRAIN THE FIX.</h1>
  <p style="margin-top:.75rem;font-size:.875rem;color:var(--muted)">Built around your weakest link: <span style="color:var(--ice);font-weight:700">${w.focus||"identified weaknesses"}</span></p>
  <div style="margin-top:1.75rem;display:flex;flex-direction:column;gap:.75rem">
    ${w.days.map(day=>`<div style="border-radius:1rem;overflow:hidden;background:var(--surface);border:1px solid var(--border)"><div style="padding:1.25rem"><div class="slabel" style="color:var(--ice);font-weight:600;margin-bottom:0">${day.day}</div><div class="bebas" style="font-size:1.25rem;margin-top:.25rem">${(day.title||"").toUpperCase()}</div><div style="margin-top:.25rem;font-size:.75rem;color:var(--muted)">${day.drills?.length||0} drills</div></div><div style="padding:0 1.25rem 1.25rem;display:flex;flex-direction:column;gap:.75rem">${(day.drills||[]).map((d,j)=>`<div style="display:flex;gap:.75rem;padding-top:.75rem;border-top:1px solid var(--border)"><div style="width:1.75rem;height:1.75rem;border-radius:.5rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:.125rem;background:var(--surface-hi)"><span class="mono" style="color:var(--ice);font-size:.75rem;font-weight:700">${j+1}</span></div><div style="flex:1"><div style="display:flex;justify-content:space-between;align-items:baseline;gap:.5rem"><div style="font-size:.875rem;font-weight:700">${d.name}</div><div class="mono" style="flex-shrink:0;font-size:.75rem;color:var(--ice);font-weight:600">${d.sets||""}</div></div>${d.note?`<div style="margin-top:.25rem;font-size:.75rem;color:var(--muted);line-height:1.5">${d.note}</div>`:""}</div></div>`).join("")}</div></div>`).join("")}
  </div>
  <button data-a="back-results" style="width:100%;margin-top:1.75rem;padding:1.25rem;border-radius:1.5rem;display:flex;align-items:center;justify-content:center;gap:.5rem;background:var(--fire);box-shadow:0 10px 30px rgba(255,45,45,.25);color:#fff"><span class="bebas" style="font-size:1.25rem">🔥 START TODAY'S SESSION</span></button>`}

function ErrorS(){return `
  <p class="slabel" style="color:var(--fire);font-weight:600">Something went wrong</p>
  <h1 class="title">ANALYSIS FAILED.</h1>
  <div style="margin-top:1.5rem;padding:1.25rem;border-radius:1rem;display:flex;align-items:flex-start;gap:.75rem;background:rgba(255,45,45,.08);border:1px solid rgba(255,45,45,.25)"><div style="color:var(--fire);flex-shrink:0;margin-top:.125rem">${icons.alert}</div><div style="font-size:.875rem;line-height:1.5;white-space:pre-wrap">${state.error||"Unknown error"}</div></div>
  <button data-a="back-skill" style="width:100%;margin-top:1.5rem;padding:1.25rem;border-radius:1.5rem;display:flex;align-items:center;justify-content:center;gap:.5rem;background:var(--ice);color:var(--bg)"><span class="bebas" style="font-size:1.25rem">TRY AGAIN</span></button>
  <button data-a="back-home" style="width:100%;margin-top:.75rem;padding:1rem;border-radius:1rem;background:var(--surface);border:1px solid var(--border);color:var(--muted);font-size:.875rem;font-weight:600">Back to home</button>`}

function renderTabBar(){
  const el=document.getElementById("tabbar");if(!el)return;
  const tabs=[{id:"home",label:"Home",icon:icons.home},{id:"upload",label:"Analyze",icon:icons.plus},{id:"stats",label:"Stats",icon:icons.stats},{id:"profile",label:"Profile",icon:icons.user}];
  el.innerHTML=`<div>${tabs.map(t=>{const a=state.screen===t.id||(t.id==="upload"&&(state.screen==="skill"||state.screen==="upload"));const p=t.id==="upload";return `<button data-tab="${t.id}" class="tab">${p?`<div class="tab-plus" style="color:#fff">${t.icon}</div>`:`<div style="color:${a?'var(--ice)':'var(--muted-dim)'}">${t.icon}</div><span style="font-size:10px;font-weight:600;color:${a?'var(--ice)':'var(--muted-dim)'}">${t.label}</span>`}</button>`}).join("")}</div>`;
  el.querySelectorAll("[data-tab]").forEach(b=>b.addEventListener("click",()=>{const t=b.dataset.tab;if(t==="upload"){state.error=null;go("skill")}else if(t==="home")go("home");else go(t)}));
}

function bind(){
  document.querySelectorAll("[data-a]").forEach(b=>b.addEventListener("click",()=>act(b.dataset.a,b.dataset)));
  const fi=document.getElementById("fi");
  if(fi)fi.addEventListener("change",e=>{const f=e.target.files?.[0];if(f)onFile(f)});
}

function act(a,d){
  switch(a){
    case "new":state.error=null;go("skill");break;
    case "back-home":go("home");break;
    case "back-skill":state.error=null;go("skill");break;
    case "back-results":go("results");break;
    case "view-last":go("results");break;
    case "pick-skill":state.skill=d.skill;go("upload");break;
    case "pick-file":document.getElementById("fi")?.click();break;
    case "show-workout":go("workout");break;
  }
}

async function onFile(f){
  if(!f.type.startsWith("video/")&&!f.name.match(/\.(mp4|mov|m4v|qt|hevc)$/i)){state.error="That doesn't look like a video file.";go("error");return}
  state.videoFile=f;
  if(state.videoUrl)URL.revokeObjectURL(state.videoUrl);
  state.videoUrl=URL.createObjectURL(f);
  state.frames=[];state.progress=0;state.stage=0;state.stageText="";
  go("analyzing");run();
}

async function run(){
  try{
    state.progress=5;renderScreen();
    const{frames,duration}=await extractFrames(state.videoFile,8,
      fr=>{state.progress=10+fr*35;state.stage=1;updateAnalyzing()},
      t=>{state.stageText=t;updateAnalyzing()}
    );
    state.frames=frames;state.stageText="";state.stage=2;state.progress=50;updateAnalyzing();
    state.stage=3;
    const iv=setInterval(()=>{state.progress=Math.min(state.progress+0.5,92);updateAnalyzing()},200);
    const result=await callBackend(frames,state.skill,duration);
    clearInterval(iv);
    state.stage=4;state.progress=98;updateAnalyzing();
    await new Promise(r=>setTimeout(r,400));
    state.progress=100;state.result={...result,_meta:{duration,frameCount:frames.length}};updateAnalyzing();
    await new Promise(r=>setTimeout(r,300));
    go("results");
  }catch(err){
    console.error("Analysis error:",err);
    let msg=err?.message||(typeof err==="string"?err:"");
    if(!msg||msg==="undefined"||msg==="null")msg=`Unknown error (type: ${typeof err}, see browser console for details)`;
    state.error=msg;
    go("error");
  }
}

renderScreen();renderTabBar();
</script>
</body>
</html>
