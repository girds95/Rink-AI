<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="robots" content="noindex,nofollow" />
<title>Rink AI · Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#07090F; --surface:#10141F; --surface-hi:#1A1F2E; --border:#222A3D;
    --ice:#5BC0EB; --fire:#FF2D2D;
    --text:#F0F4FA; --muted:#7B8499; --muted-dim:#4A5266;
    --good:#4ADE80; --warn:#FBBF24;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
  html,body{background:var(--bg);font-family:'Manrope',-apple-system,sans-serif;color:var(--text);min-height:100vh;min-height:100dvh}
  .bebas{font-family:'Bebas Neue',sans-serif;letter-spacing:.04em}
  .mono{font-family:'JetBrains Mono',monospace}
  input,button{font:inherit;color:inherit;outline:none;border:none;background:transparent}
  button{cursor:pointer;transition:transform .1s}
  button:active{transform:scale(.98)}

  .container{max-width:900px;margin:0 auto;padding:max(1.25rem,env(safe-area-inset-top)) 1.25rem max(1.25rem,env(safe-area-inset-bottom))}

  /* LOGIN */
  .login{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;padding:1rem}
  .login h1{font-size:32px;margin-bottom:.5rem}
  .login p{color:var(--muted);margin-bottom:1.5rem;font-size:.875rem}
  .login form{width:100%;max-width:340px;display:flex;flex-direction:column;gap:.75rem}
  .login input{padding:1rem 1.25rem;border-radius:.75rem;background:var(--surface-hi);border:1px solid var(--border);font-size:1rem}
  .login input:focus{border-color:var(--ice)}
  .login button{padding:1rem;border-radius:.75rem;background:var(--ice);color:var(--bg);font-weight:700;font-family:'Bebas Neue';font-size:1.125rem;letter-spacing:.04em}
  .login .err{color:var(--fire);font-size:.8125rem;margin-top:.5rem}

  /* DASHBOARD */
  .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid var(--border)}
  .header h1{font-size:24px}
  .header .meta{font-size:.75rem;color:var(--muted)}

  .grid{display:grid;gap:.75rem}
  .grid-3{grid-template-columns:repeat(3,1fr)}
  .grid-2{grid-template-columns:repeat(2,1fr)}
  @media (max-width:600px){.grid-3{grid-template-columns:repeat(2,1fr)}}

  .card{background:var(--surface);border:1px solid var(--border);border-radius:1rem;padding:1rem}
  .card .label{font-size:.6875rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-family:'JetBrains Mono';font-weight:600;margin-bottom:.375rem}
  .card .value{font-family:'Bebas Neue';font-size:2rem;line-height:1;letter-spacing:.02em}
  .card .sub{font-size:.75rem;color:var(--muted);margin-top:.25rem}

  .section{margin-top:1.75rem}
  .section-title{font-family:'JetBrains Mono';font-size:.6875rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:700;margin-bottom:.75rem}

  table{width:100%;border-collapse:collapse}
  th,td{text-align:left;padding:.625rem .5rem;border-bottom:1px solid var(--border);font-size:.8125rem}
  th{color:var(--muted);font-weight:600;font-family:'JetBrains Mono';font-size:.6875rem;text-transform:uppercase;letter-spacing:.05em}
  td.mono{font-family:'JetBrains Mono';font-size:.75rem}
  .truncate{max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  .chart{height:120px;display:flex;align-items:flex-end;gap:.25rem;padding:.5rem 0}
  .chart .bar{flex:1;background:var(--ice);border-radius:.25rem .25rem 0 0;min-height:2px;position:relative}
  .chart .bar.zero{background:var(--surface-hi)}
  .chart .label{position:absolute;bottom:-1.25rem;left:50%;transform:translateX(-50%);font-size:9px;color:var(--muted);font-family:'JetBrains Mono'}
  .chart-wrap{position:relative;padding-bottom:1.5rem}

  .badge{display:inline-block;padding:.125rem .5rem;border-radius:9999px;font-size:.6875rem;font-family:'JetBrains Mono';font-weight:700;letter-spacing:.05em}
  .badge.green{background:rgba(74,222,128,.15);color:var(--good)}
  .badge.red{background:rgba(255,45,45,.15);color:var(--fire)}
  .badge.blue{background:rgba(91,192,235,.15);color:var(--ice)}
  .badge.muted{background:var(--surface-hi);color:var(--muted)}

  .empty{padding:2rem;text-align:center;color:var(--muted);font-size:.875rem}

  .btn{padding:.625rem 1rem;border-radius:.5rem;background:var(--surface-hi);border:1px solid var(--border);font-size:.8125rem;font-weight:600;color:var(--text)}
  .btn:hover{border-color:var(--ice);color:var(--ice)}
</style>
</head>
<body>
<div class="container" id="root"></div>

<script>
const root = document.getElementById("root");
const PASS_KEY = "rinkai.adminPassword";
let data = null;
let loading = false;
let error = null;

function fmtDate(s) {
  if (!s) return "—";
  const d = new Date(s);
  const now = new Date();
  const diff = (now - d) / 1000;
  if (diff < 60) return "just now";
  if (diff < 3600) return Math.floor(diff/60) + "m ago";
  if (diff < 86400) return Math.floor(diff/3600) + "h ago";
  if (diff < 86400*7) return Math.floor(diff/86400) + "d ago";
  return d.toLocaleDateString();
}

function escapeHtml(s) { return (s == null ? "" : String(s)).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

async function fetchData(password) {
  loading = true; error = null; render();
  try {
    const r = await fetch("/api/admin", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ password }),
    });
    if (r.status === 401) {
      sessionStorage.removeItem(PASS_KEY);
      throw new Error("Wrong password");
    }
    if (!r.ok) {
      const j = await r.json().catch(() => ({}));
      throw new Error(j.error || `HTTP ${r.status}`);
    }
    data = await r.json();
    sessionStorage.setItem(PASS_KEY, password);
  } catch (err) {
    error = err.message;
  }
  loading = false;
  render();
}

function loginScreen(errMsg) {
  root.innerHTML = `
    <div class="login">
      <h1 class="bebas">RINK AI ADMIN</h1>
      <p>Enter your admin password.</p>
      <form id="lf">
        <input type="password" id="pw" placeholder="Password" autocomplete="current-password" required autofocus />
        <button type="submit">SIGN IN</button>
        ${errMsg ? `<div class="err">${escapeHtml(errMsg)}</div>` : ""}
      </form>
    </div>
  `;
  document.getElementById("lf").addEventListener("submit", e => {
    e.preventDefault();
    const pw = document.getElementById("pw").value;
    fetchData(pw);
  });
}

function dashboard() {
  const s = data.summary;
  const series = data.series || [];
  const maxStarts = Math.max(...series.map(d => d.starts), 1);

  root.innerHTML = `
    <div class="header">
      <div>
        <h1 class="bebas">RINK AI · ADMIN</h1>
        <div class="meta">Refreshed ${fmtDate(new Date().toISOString())}</div>
      </div>
      <button class="btn" id="refresh">Refresh</button>
    </div>

    <div class="grid grid-3">
      <div class="card">
        <div class="label">Total signups</div>
        <div class="value">${s.total_users}</div>
        <div class="sub">${s.total_profiles} profile${s.total_profiles===1?'':'s'} created</div>
      </div>
      <div class="card">
        <div class="label">Active today</div>
        <div class="value">${s.active_users_today}</div>
        <div class="sub">unique users + anon</div>
      </div>
      <div class="card">
        <div class="label">Analyses today</div>
        <div class="value" style="color:var(--good)">${s.analyses_today}</div>
        <div class="sub">${s.starts_today} started · ${s.fails_today} failed</div>
      </div>
      <div class="card">
        <div class="label">Analyses 7d</div>
        <div class="value">${s.analyses_7d}</div>
      </div>
      <div class="card">
        <div class="label">Analyses 30d</div>
        <div class="value">${s.analyses_30d}</div>
      </div>
      <div class="card">
        <div class="label">Total saved</div>
        <div class="value">${s.total_sessions_saved}</div>
        <div class="sub">in DB (signed in only)</div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Last 14 days · analyses started</div>
      <div class="card">
        <div class="chart-wrap">
          <div class="chart">
            ${series.map((d,i) => {
              const h = (d.starts / maxStarts) * 100;
              const isLast = i === series.length - 1;
              const isFirst = i === 0;
              return `
                <div class="bar ${d.starts === 0 ? 'zero' : ''}" style="height:${Math.max(h,2)}%" title="${d.date}: ${d.starts} starts, ${d.analyses} success, ${d.fails} fail">
                  ${(isFirst || isLast || i % 3 === 0) ? `<div class="label">${d.date.slice(5)}</div>` : ''}
                </div>
              `;
            }).join("")}
          </div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">7-day funnel</div>
      <div class="grid grid-3">
        <div class="card">
          <div class="label">Started</div>
          <div class="value">${data.funnel.starts7}</div>
        </div>
        <div class="card">
          <div class="label">Succeeded</div>
          <div class="value" style="color:var(--good)">${data.funnel.successes7}</div>
          <div class="sub">${data.funnel.starts7 ? Math.round(data.funnel.successes7/data.funnel.starts7*100) : 0}% complete</div>
        </div>
        <div class="card">
          <div class="label">Failed</div>
          <div class="value" style="color:var(--fire)">${data.funnel.fails7}</div>
          <div class="sub">${data.funnel.starts7 ? Math.round(data.funnel.fails7/data.funnel.starts7*100) : 0}% fail rate</div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Top skills (30d)</div>
      ${data.top_skills.length === 0 ? '<div class="card empty">No analyses yet</div>' : `
        <div class="card">
          ${data.top_skills.map(([sk, n]) => `
            <div style="display:flex;justify-content:space-between;align-items:center;padding:.5rem 0;border-bottom:1px solid var(--border)">
              <span>${escapeHtml(sk)}</span>
              <span class="badge blue">${n}</span>
            </div>
          `).join("")}
        </div>
      `}
    </div>

    <div class="section">
      <div class="section-title">Recent users</div>
      ${data.recent_users.length === 0 ? '<div class="card empty">No users yet</div>' : `
        <div class="card" style="overflow-x:auto;padding:.5rem">
          <table>
            <thead><tr><th>Email</th><th>Provider</th><th>Signed up</th><th>Last seen</th></tr></thead>
            <tbody>
              ${data.recent_users.map(u => `
                <tr>
                  <td class="truncate" title="${escapeHtml(u.email)}">${escapeHtml(u.email || "—")}</td>
                  <td><span class="badge muted">${escapeHtml(u.provider)}</span></td>
                  <td class="mono">${fmtDate(u.created_at)}</td>
                  <td class="mono">${fmtDate(u.last_sign_in)}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      `}
    </div>

    <div class="section">
      <div class="section-title">Recent sessions</div>
      ${data.recent_sessions.length === 0 ? '<div class="card empty">No sessions yet</div>' : `
        <div class="card" style="overflow-x:auto;padding:.5rem">
          <table>
            <thead><tr><th>When</th><th>Who</th><th>Player</th><th>Skill</th><th>Score</th></tr></thead>
            <tbody>
              ${data.recent_sessions.map(s => `
                <tr>
                  <td class="mono">${fmtDate(s.created_at)}</td>
                  <td class="truncate" title="${escapeHtml(s.user_email)}">${escapeHtml(s.user_email || "—")}</td>
                  <td>${escapeHtml(s.profile_name || "—")}</td>
                  <td>${escapeHtml(s.skill)}</td>
                  <td><span class="badge ${s.score >= 70 ? 'green' : s.score >= 50 ? 'blue' : 'red'}">${s.score || '—'} · ${escapeHtml(s.grade || '')}</span></td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      `}
    </div>

    <div class="section">
      <div class="section-title">Recent failures (7d)</div>
      ${data.recent_failures.length === 0 ? '<div class="card empty">No failures recorded · 🎉</div>' : `
        <div class="card" style="overflow-x:auto;padding:.5rem">
          <table>
            <thead><tr><th>When</th><th>Skill</th><th>Reason</th></tr></thead>
            <tbody>
              ${data.recent_failures.map(f => `
                <tr>
                  <td class="mono">${fmtDate(f.when)}</td>
                  <td>${escapeHtml(f.skill || '—')}</td>
                  <td class="truncate mono" title="${escapeHtml(f.reason)}" style="max-width:400px">${escapeHtml(f.reason)}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      `}
    </div>
  `;

  document.getElementById("refresh").addEventListener("click", () => {
    const pw = sessionStorage.getItem(PASS_KEY);
    if (pw) fetchData(pw);
  });
}

function render() {
  if (loading) {
    root.innerHTML = `<div class="login"><div style="color:var(--muted);font-family:'JetBrains Mono';font-size:.875rem">Loading...</div></div>`;
    return;
  }
  if (!data) {
    loginScreen(error);
    return;
  }
  dashboard();
}

(function init() {
  const stored = sessionStorage.getItem(PASS_KEY);
  if (stored) fetchData(stored);
  else render();
})();
</script>
</body>
</html>
